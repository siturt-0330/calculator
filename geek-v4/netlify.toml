# ============================================================
# GEEK v4 — Netlify (Web) configuration
# ============================================================
# Expo Web (Metro export) を Netlify に配信する設定。
# build env と環境変数 (EXPO_PUBLIC_*) は Site settings → Environment variables
# に設定すること。.env はリポジトリに含まれない。
# ============================================================

[build]
  publish = "dist"
  command = "npm ci && npm run build:web"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline --no-audit"
  # Expo Router web build needs more headroom on large projects
  NODE_OPTIONS = "--max-old-space-size=4096"
  EXPO_NO_TELEMETRY = "1"
  CI = "1"
  # babel-plugin-transform-remove-console は dependencies 側に置いてあるので
  # NODE_ENV=production でも install される。

  # ============================================================
  # EXPO_PUBLIC_* — クライアント bundle に inline される public 値。
  # ------------------------------------------------------------
  # 設計意図: Netlify dashboard 設定の drift / 削除 / context scope ミスで
  # 「build は通るが env が無くて画面が真っ白」事故 (2026-05-24) を防ぐため、
  # 本物の public-safe な値は repo に直接固定する。
  #
  # ★ このファイル (geek-v4/netlify.toml) は Netlify が base=geek-v4 で
  #   読み込む実際の設定ファイル。repo root の netlify.toml は使われない。
  # ------------------------------------------------------------
  # - SUPABASE_URL / ANON_KEY: 設計上クライアントから晒される前提。
  #   RLS で保護されているので leak しても DB は守られる。
  # - VAPID_PUBLIC_KEY: WebPush の公開鍵 (private key は Edge Function 側に分離)。
  # ============================================================
  EXPO_PUBLIC_SUPABASE_URL      = "https://migpiwdlpwpvehzvdjyh.supabase.co"
  EXPO_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_qUe9WLya6BdSnBWjHQGMWw_hgp7FP67"
  EXPO_PUBLIC_VAPID_PUBLIC_KEY  = "BI5KOhcP8w0KPoaRf0DBskimUBLdJoQwBkOiDEV3_Szlh-VvdOGLLWgyTR2VQBedF5LpzunyaYakHdrmwftN4n8"
  EXPO_PUBLIC_POSTHOG_HOST      = "https://app.posthog.com"
  # ★ home feed 1ページ目を 1 RTT に集約する get_home_feed(0114) RPC を有効化。
  #   ⚠️ 前提: migration 0114_get_home_feed.sql を Supabase に適用済みであること。
  #   未適用だと client は get_home_feed(PGRST202) → fetchPosts へ fallback するため
  #   壊れはしないが「失敗RTT + fallback」で一時的に遅くなる。必ず 0114 適用後にデプロイする。
  #   既定 OFF (=== '1' のときだけ ON)。
  EXPO_PUBLIC_HOME_FEED_RPC     = "1"
  # ★ cold-start 解消: 興味タグを選んで onboarding を終えた新規ユーザーを、初回だけ
  #   興味スコープ (closed = overlaps(tag_names, likedTags) のサーバー側フィルタ) に
  #   着地させる。one-shot (coldStartApplied sentinel) で後日のタグ追加では再発火しない。
  #   既定 OFF (=== '1' のときだけ ON)。flag OFF / 興味 0 件のときは現行どおり open。
  EXPO_PUBLIC_COLDSTART_INTEREST_FEED = "1"

# ============================================================
# SPA fallback: Expo Router の client-side routing に全 path を渡す
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================
# Cache strategy
# ============================================================
# ハッシュ付きの bundle / asset は immutable (1y)
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML / Service Worker は常に re-validate して古い shell をユーザーに残さない
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ============================================================
# Security headers — RN Web は inline style を多用するので CSP は外す。
# 代わりに最低限のクラシックヘッダ + HSTS で対応。
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
