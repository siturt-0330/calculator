# ============================================================
# Netlify build configuration (Geek v4 — Expo Web export)
# ============================================================
# This file is checked into the repo root so Netlify always uses
# the same build pipeline regardless of dashboard drift.
#
# Required environment variables (set in Netlify dashboard → Site settings → Environment):
#   EXPO_PUBLIC_SUPABASE_URL       (required — app crashes without it)
#   EXPO_PUBLIC_SUPABASE_ANON_KEY  (required)
#   EXPO_PUBLIC_POSTHOG_KEY        (optional)
#   EXPO_PUBLIC_POSTHOG_HOST       (optional)
#   EXPO_PUBLIC_SENTRY_DSN         (optional)
#
# Deployment branch: `master` (set in dashboard or via [context.production])
# ============================================================

[build]
  base    = "geek-v4"
  command = "npm ci --legacy-peer-deps && npx expo export --platform web --output-dir dist"
  publish = "geek-v4/dist"

[build.environment]
  NODE_VERSION         = "20"
  NPM_FLAGS            = "--legacy-peer-deps"
  # Expo Router web build needs more headroom on large projects
  NODE_OPTIONS         = "--max-old-space-size=4096"
  # Skip Expo telemetry on CI to avoid hangs
  EXPO_NO_TELEMETRY    = "1"
  CI                   = "1"

# ============================================================
# SPA fallback — every unknown URL serves index.html
# Expo Router handles client-side routing from there.
# ============================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ============================================================
# Security & caching headers
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=(self)"

# Long-cache hashed Expo assets (file names contain content hashes)
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html / manifest must NEVER be cached aggressively, else users see stale app
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================
# Branch-specific contexts (optional but recommended)
# ============================================================
# Production builds from master — fail fast on lint/TS errors
[context.production.environment]
  NODE_ENV = "production"

# Preview deploys for other branches — keep them lenient
[context.deploy-preview.environment]
  NODE_ENV = "production"
