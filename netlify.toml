# ============================================================
# Netlify build configuration (Geek v4 — Expo Web export)
# ============================================================
# This file is checked into the repo root so Netlify always uses
# the same build pipeline regardless of dashboard drift.
#
# Required environment variables (set in Netlify dashboard → Site settings → Environment):
#   EXPO_PUBLIC_SUPABASE_URL       (required — app crashes without it)
#   EXPO_PUBLIC_SUPABASE_ANON_KEY  (required)
#   EXPO_PUBLIC_POSTHOG_KEY        (optional)
#   EXPO_PUBLIC_POSTHOG_HOST       (optional)
#   EXPO_PUBLIC_SENTRY_DSN         (optional)
#
# Deployment branch: `master` (set in dashboard or via [context.production])
# ============================================================

[build]
  base    = "geek-v4"
  command = "npm ci --legacy-peer-deps && npx expo export --platform web --output-dir dist"
  # publish is relative to `base` (Netlify quirk). So with base=geek-v4 and
  # dist created at geek-v4/dist, publish must be just "dist" — NOT "geek-v4/dist"
  # (the latter resolves to geek-v4/geek-v4/dist which doesn't exist).
  publish = "dist"

[build.environment]
  NODE_VERSION         = "20"
  NPM_FLAGS            = "--legacy-peer-deps"
  # Expo Router web build needs more headroom on large projects
  NODE_OPTIONS         = "--max-old-space-size=4096"
  # Skip Expo telemetry on CI to avoid hangs
  EXPO_NO_TELEMETRY    = "1"
  CI                   = "1"

# ============================================================
# SPA fallback — every unknown URL serves index.html
# Expo Router handles client-side routing from there.
# ============================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ============================================================
# Security & caching headers
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(self)"
    # HSTS: 1 年強制 HTTPS、サブドメイン含む。プリロード申請は無し
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # XSS 対策: 自分のドメイン + Supabase + Leaflet タイル + 必要な CDN だけ
    # 'unsafe-inline' は Expo Web の inline style/script に必要 (Reanimated worklet 等)
    # 'unsafe-eval' は Hermes 不使用環境で求められることがある — 一旦許可
    # CSP — 'unsafe-inline'/'unsafe-eval' は Expo Web の Reanimated worklet 等で必須。
    # img-src の `https:` は Supabase Storage の avatar / link preview などで動的 URL を使うため許可。
    # 追加保護: worker-src/manifest-src/upgrade-insecure-requests/frame-ancestors を明示。
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://app.posthog.com https://*.sentry.io; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://app.posthog.com https://*.sentry.io https://*.tile.openstreetmap.org; frame-src 'self' https://www.google.com https://maps.google.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    # クロスオリジン埋め込み禁止 (clickjacking 防御)
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"

# Long-cache hashed Expo assets (file names contain content hashes)
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html / manifest must NEVER be cached aggressively, else users see stale app
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================
# Branch-specific contexts (optional but recommended)
# ============================================================
# Production builds from master — fail fast on lint/TS errors
[context.production.environment]
  NODE_ENV = "production"

# Preview deploys for other branches — keep them lenient
[context.deploy-preview.environment]
  NODE_ENV = "production"
