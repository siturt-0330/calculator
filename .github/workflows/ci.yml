name: CI

# PR / push to master で typecheck + unit test を実行。
#
# ⚠️ アプリ本体は repo root ではなく geek-v4/ サブディレクトリにある。
#    GitHub Actions は repo root の .github/workflows/ しか実行しないので、
#    この workflow は root に置き、全 run step を defaults.run.working-directory で
#    geek-v4/ に固定する (npm ci は geek-v4/package-lock.json と
#    geek-v4/.npmrc の legacy-peer-deps=true を読む)。
#
# eslint は eslint-config-expo の依存欠落のため一旦コメントアウト (別 PR で resolve 予定)

on:
  push:
    branches: [master, main]
    paths:
      - 'geek-v4/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'geek-v4/**'
      - '.github/workflows/ci.yml'
  # CI 設定変更後などに手動で回せるように (build-web の if が参照する)
  workflow_dispatch:

# 同一 PR で push を連打した時は古い run をキャンセル
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 全 run step を geek-v4/ で実行 (uses: のアクションには効かないので
# setup-node の cache-dependency-path は別途 geek-v4/ を明示する)
defaults:
  run:
    working-directory: geek-v4

jobs:
  check:
    name: TypeScript + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # working-directory は uses: に効かないため lockfile を明示
          cache-dependency-path: geek-v4/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          # Netlify と同じく NODE_ENV=production だと devDeps を skip するので
          # CI では明示的に development にして type-check / test に必要な devDeps を入れる
          NODE_ENV: development

      - name: TypeScript type check
        run: npm run type-check

      - name: Unit tests
        run: npm test -- --ci --reporters=default --runInBand

      # - name: Lint
      #   run: npm run lint
      #   # TODO: eslint-config-expo を install して有効化

  build-web:
    name: Web build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    # PR は skip (デプロイ前確認用)、master push と手動 dispatch で動かす
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: geek-v4/package-lock.json
      - run: npm ci
        env:
          NODE_ENV: development
      - name: Build web bundle (smoke)
        run: npm run build:web
        env:
          # ビルドが env 不在で死なないように dummy 値を渡す。
          # 実 deploy は Netlify 側の env が使われる。
          EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
